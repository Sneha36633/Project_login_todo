<!DOCTYPE html>
<html>

<head>
  <title>Todo App</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f7f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .todo-card {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    .add-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f9f9f9;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #1a73e8;
    }

    .actions button {
      margin-left: 5px;
      padding: 5px 8px;
      cursor: pointer;
      border-radius: 3px;
      border: none;
      color: white;
    }

    .edit-btn {
      background: #ffc107;
    }

    .del-btn {
      background: #dc3545;
    }

    .logout {
      margin-top: 20px;
      color: #666;
      cursor: pointer;
      background: none;
      border: 1px solid #666;
      padding: 5px 10px;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <div class="todo-card">
    <h2>My Todo List</h2>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="New Task...">
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <ul id="list"></ul>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";

    async function loadTodos() {
      const res = await fetch("http://localhost:5000/todos", { headers: { "Authorization": token } });
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";
      data.forEach(todo => {
        const li = document.createElement("li");
        li.innerHTML = `
      <span>${todo.task}</span>
      <div class="actions">
        <button class="edit-btn" onclick="updateTodo(${todo.id}, '${todo.task}')">Edit</button>
        <button class="del-btn" onclick="deleteTodo(${todo.id})">Delete</button>
      </div>
    `;
        list.appendChild(li);
      });
    }

    async function addTodo() {
      const task = document.getElementById("taskInput").value;
      if (!task) return;
      await fetch("http://localhost:5000/todos", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": token },
        body: JSON.stringify({ task })
      });
      document.getElementById("taskInput").value = "";
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`http://localhost:5000/todos/${id}`, { method: "DELETE", headers: { "Authorization": token } });
      loadTodos();
    }

    async function updateTodo(id, oldTask) {
      const newTask = prompt("Edit Task:", oldTask);
      if (newTask) {
        await fetch(`http://localhost:5000/todos/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "Authorization": token },
          body: JSON.stringify({ task: newTask })
        });
        loadTodos();
      }
    }

    function logout() { localStorage.removeItem("token"); window.location.href = "login.html"; }
    loadTodos();
  </script>
</body>

</html>
